<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 Learning Notes Hub | Secure Login</title>
    <style>
        :root {
            --bg: #f8fafc;
            --bg-card: #ffffff;
            --bg-sidebar: #ffffff;
            --text: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05), 0 1px 3px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.06), 0 2px 6px rgba(0,0,0,0.04);
            --shadow-lg: 0 12px 28px rgba(0,0,0,0.08), 0 4px 12px rgba(0,0,0,0.04);
            --shadow-xl: 0 25px 50px -12px rgba(0,0,0,0.12);
            --accent: #6366f1;
            --accent-light: #818cf8;
            --accent-bg: #eef2ff;
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
            --radius-sm: 10px;
            --radius: 16px;
            --radius-lg: 22px;
            --radius-xl: 28px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            --font: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        [data-theme="dark"] {
            --bg: #0f172a;
            --bg-card: #1e293b;
            --bg-sidebar: #1a2332;
            --text: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #64748b;
            --border: #334155;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.35);
            --shadow-lg: 0 12px 30px rgba(0,0,0,0.4);
            --shadow-xl: 0 25px 55px rgba(0,0,0,0.45);
            --accent-bg: #1e1b4b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; font-size: 16px; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            transition: background 0.4s, color 0.4s;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .bg-decoration {
            position: fixed; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index:0; overflow: hidden;
        }
        .blob {
            position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.07;
            transition: opacity 0.4s; will-change: transform;
        }
        .blob-1 { width:600px; height:600px; background: var(--accent); top:-200px; left:-100px; animation: floatBlob 20s infinite alternate ease-in-out; }
        .blob-2 { width:500px; height:500px; background:#a855f7; bottom:-150px; right:-100px; animation: floatBlob 25s infinite alternate-reverse ease-in-out; }
        .blob-3 { width:400px; height:400px; background:#3b82f6; top:50%; left:40%; animation: floatBlob 30s infinite alternate ease-in-out; }
        @keyframes floatBlob {
            0% { transform: translate(0,0) scale(1); }
            100% { transform: translate(40px,-30px) scale(1.1); }
        }

        .login-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; transition: opacity 0.4s, visibility 0.4s;
        }
        .login-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .login-card {
            background: var(--bg-card); border-radius: var(--radius-lg);
            padding: 36px 32px; width: 360px; max-width: 90vw;
            box-shadow: var(--shadow-xl); text-align: center;
            animation: slideUp 0.5s cubic-bezier(0.22,0.61,0.36,1);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-logo { font-size: 3rem; margin-bottom: 12px; }
        .login-title { font-weight: 700; font-size: 1.5rem; margin-bottom: 6px; color: var(--text); }
        .login-subtitle { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 24px; }
        .login-input {
            width: 100%; padding: 12px 16px; border-radius: 50px;
            border: 2px solid var(--border); background: var(--bg);
            font-size: 0.95rem; color: var(--text); outline: none;
            transition: all var(--transition); text-align: center;
        }
        .login-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(99,102,241,0.15); }
        .login-btn {
            width: 100%; margin-top: 18px; padding: 13px;
            border-radius: 50px; border: none;
            background: var(--accent-gradient); color: white;
            font-weight: 700; font-size: 1rem; cursor: pointer;
            transition: all var(--transition); box-shadow: 0 6px 16px rgba(99,102,241,0.35);
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 22px rgba(99,102,241,0.45); }
        .login-error { color: #ef4444; font-size: 0.85rem; margin-top: 10px; min-height: 20px; transition: 0.2s; }

        .app-wrapper { display: flex; flex: 1; flex-direction: column; opacity: 0; transition: opacity 0.4s; }
        .app-wrapper.visible { opacity: 1; }

        .top-nav {
            position: sticky; top:0; z-index:100; background: var(--bg-card);
            border-bottom:1px solid var(--border); padding:0 28px; height:68px;
            display:flex; align-items:center; justify-content:space-between;
            backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
            box-shadow:var(--shadow-sm); transition:all 0.4s;
        }
        @supports (backdrop-filter: blur(14px)) {
            .top-nav { background: color-mix(in srgb, var(--bg-card) 80%, transparent); }
        }
        .nav-brand { display:flex; align-items:center; gap:12px; font-weight:700; font-size:1.35rem; letter-spacing:-0.4px; color:var(--text); text-decoration:none; white-space:nowrap; }
        .logo-icon { width:44px; height:44px; border-radius:var(--radius-sm); background:var(--accent-gradient); display:flex; align-items:center; justify-content:center; font-size:1.4rem; color:white; box-shadow:0 6px 16px rgba(99,102,241,0.35); transition:transform 0.3s; }
        .nav-brand:hover .logo-icon { transform:scale(1.05) rotate(5deg); }
        .nav-actions { display:flex; align-items:center; gap:10px; }
        .icon-btn { width:42px; height:42px; border-radius:50%; border:2px solid var(--border); background:var(--bg-card); cursor:pointer; font-size:1.2rem; display:flex; align-items:center; justify-content:center; color:var(--text); transition:all var(--transition); flex-shrink:0; }
        .icon-btn:hover { border-color:var(--accent); background:var(--accent-bg); box-shadow:var(--shadow-md); transform:scale(1.05); }
        .theme-toggle .moon, .theme-toggle .sun { position:absolute; transition:opacity 0.3s, transform 0.3s; }
        .theme-toggle .sun { opacity:0; transform:rotate(90deg); }
        [data-theme="dark"] .theme-toggle .moon { opacity:0; transform:rotate(-90deg); }
        [data-theme="dark"] .theme-toggle .sun { opacity:1; transform:rotate(0deg); }
        .menu-btn { display:none; }

        .app-container { display:flex; flex:1; position:relative; z-index:1; }
        .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:48; backdrop-filter:blur(2px); }
        .sidebar-overlay.active { display:block; }

        .sidebar {
            width:270px; min-width:270px; background:var(--bg-sidebar);
            border-right:1px solid var(--border); padding:24px 14px;
            display:flex; flex-direction:column; gap:4px; overflow-y:auto;
            transition:all 0.4s; z-index:50; position:sticky;
            top:68px; height:calc(100vh - 68px); backdrop-filter:blur(12px);
        }
        .sidebar-label { font-size:0.7rem; text-transform:uppercase; letter-spacing:1.8px; color:var(--text-muted); padding:8px 14px 6px; font-weight:700; }
        .sidebar-link {
            display:flex; align-items:center; gap:10px; padding:11px 14px;
            border-radius:var(--radius-sm); text-decoration:none;
            color:var(--text-secondary); font-weight:500; font-size:0.9rem;
            transition:all var(--transition); cursor:pointer; border:none;
            background:transparent; width:100%; text-align:left; position:relative;
        }
        .sidebar-link:hover { background:var(--accent-bg); color:var(--accent); }
        .sidebar-link.active {
            background:var(--accent-bg); color:var(--accent);
            font-weight:600; box-shadow:inset 3px 0 0 var(--accent);
        }
        .cat-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
        .sidebar-link .badge { margin-left:auto; background:var(--border); color:var(--text-secondary); font-size:0.7rem; padding:2px 9px; border-radius:20px; font-weight:600; transition:all var(--transition); }
        .sidebar-link.active .badge { background:var(--accent); color:white; }

        .main-content { flex:1; padding:32px 36px 40px; overflow-y:auto; max-width:100%; position:relative; }
        .search-wrapper { position:relative; max-width:540px; margin-bottom:32px; }
        .search-input {
            width:100%; padding:14px 20px 14px 48px; border-radius:60px;
            border:2px solid var(--border); background:var(--bg-card);
            font-size:0.95rem; color:var(--text); transition:all var(--transition-smooth);
            outline:none; box-shadow:var(--shadow-sm);
        }
        .search-input:focus { border-color:var(--accent); box-shadow:0 0 0 5px rgba(99,102,241,0.12), var(--shadow-md); transform:scale(1.01); }
        .search-input::placeholder { color:var(--text-muted); }
        .search-icon { position:absolute; left:18px; top:50%; transform:translateY(-50%); font-size:1.1rem; color:var(--text-muted); transition:color 0.3s; pointer-events:none; }
        .search-input:focus ~ .search-icon { color:var(--accent); }
        .search-clear { position:absolute; right:15px; top:50%; transform:translateY(-50%); background:var(--border); border:none; width:28px; height:28px; border-radius:50%; cursor:pointer; font-size:0.85rem; color:var(--text-secondary); display:none; align-items:center; justify-content:center; transition:all 0.2s; }
        .search-clear.visible { display:flex; }
        .search-clear:hover { background:#ef4444; color:white; }

        .section-header { display:flex; align-items:baseline; gap:14px; margin-bottom:22px; flex-wrap:wrap; }
        .section-title { font-size:1.55rem; font-weight:700; letter-spacing:-0.5px; }
        .section-count { font-size:0.8rem; color:var(--text-muted); background:var(--border); padding:3px 12px; border-radius:24px; font-weight:600; }

        .notes-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px,1fr)); gap:20px; margin-bottom:30px; }

        .note-card {
            background:var(--bg-card); border-radius:var(--radius);
            padding:24px 20px 20px; border:1px solid var(--border);
            box-shadow:var(--shadow-sm); transition:all var(--transition-smooth);
            cursor:pointer; text-decoration:none; color:inherit;
            display:flex; flex-direction:column; gap:14px;
            position:relative; overflow:hidden;
            animation:cardEntry 0.5s cubic-bezier(0.22,0.61,0.36,1) forwards;
            opacity:0; transform:translateY(20px) scale(0.97);
        }
        @keyframes cardEntry { to { opacity:1; transform:translateY(0) scale(1); } }
        .note-card::before { content:''; position:absolute; top:0; left:0; right:0; height:5px; border-radius:var(--radius) var(--radius) 0 0; transition:height 0.35s; }
        .note-card:hover { box-shadow:var(--shadow-xl); transform:translateY(-6px) scale(1.02); border-color:transparent; }
        .note-card:hover::before { height:8px; }
        .note-card:active { transform:scale(0.98); transition:0.1s; }
        .card-arrow { position:absolute; top:20px; right:20px; font-size:0.9rem; color:var(--text-muted); opacity:0; transform:translateX(-10px); transition:all 0.35s; }
        .note-card:hover .card-arrow { opacity:1; transform:translateX(0); }
        .card-icon-row { display:flex; align-items:center; gap:12px; }
        .card-icon { width:44px; height:44px; border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center; font-size:1.3rem; flex-shrink:0; }
        .card-title { font-weight:700; font-size:1.05rem; letter-spacing:-0.2px; }
        .card-desc { font-size:0.88rem; color:var(--text-secondary); line-height:1.5; flex:1; }
        .card-tags { display:flex; flex-wrap:wrap; gap:6px; }
        .tag { font-size:0.7rem; padding:5px 10px; border-radius:24px; font-weight:600; letter-spacing:0.2px; background:var(--accent-bg); color:var(--accent); }
        .card-meta { font-size:0.75rem; color:var(--text-muted); display:flex; align-items:center; gap:6px; }

        .no-results { display:none; text-align:center; padding:50px; color:var(--text-muted); }
        .no-results.visible { display:block; }

        .app-footer { text-align:center; padding:18px 24px; font-size:0.8rem; color:var(--text-muted); border-top:1px solid var(--border); background:var(--bg-card); z-index:2; }

        @media (max-width:900px) {
            .sidebar { position:fixed; left:-290px; top:68px; height:calc(100vh - 68px); width:280px; min-width:280px; z-index:99; box-shadow:var(--shadow-xl); }
            .sidebar.open { left:0; }
            .menu-btn { display:flex; }
            .main-content { padding:20px 16px; }
            .notes-grid { grid-template-columns:repeat(auto-fill, minmax(260px,1fr)); gap:14px; }
            .nav-brand { font-size:1.15rem; }
            .logo-icon { width:38px; height:38px; font-size:1.2rem; }
        }
        @media (max-width:500px) {
            .notes-grid { grid-template-columns:1fr; }
            .note-card { padding:18px 14px; }
        }
    </style>
</head>

            const noResults = document.getElementById('noResults');
            const sectionTitle = document.getElementById('sectionTitle');
            const sectionCount = document.getElementById('sectionCount');
            const themeToggle = document.getElementById('themeToggle');
            const menuBtn = document.getElementById('menuBtn');
            const sidebarOverlay = document.getElementById('sidebarOverlay');

            let activeCategory = 'all';
            let searchQuery = '';

            // ========== AUTH LOGIC ==========
            async function sha256(message) {
                const msgBuffer = new TextEncoder().encode(message);
                const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            }

            async function checkPassword(password) {
                const hash = await sha256(password);
                return hash === PASSWORD_HASH;
            }

            function showApp() {
                loginOverlay.classList.add('hidden');
                appWrapper.classList.add('visible');
                sessionStorage.setItem(SESSION_KEY, 'true');
                setTimeout(() => searchInput.focus(), 100);
            }

            function showLogin() {
                loginOverlay.classList.remove('hidden');
                appWrapper.classList.remove('visible');
                sessionStorage.removeItem(SESSION_KEY);
                passwordInput.value = '';
                loginError.textContent = '';
                passwordInput.focus();
            }

            loginBtn.addEventListener('click', async () => {
                const password = passwordInput.value.trim();
                if (!password) {
                    loginError.textContent = 'Please enter a password.';
                    return;
                }
                const valid = await checkPassword(password);
                if (valid) {
                    showApp();
                } else {
                    loginError.textContent = 'Incorrect password. Try again.';
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            });

            passwordInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') loginBtn.click();
            });

            logoutBtn.addEventListener('click', showLogin);

            if (sessionStorage.getItem(SESSION_KEY) === 'true') {
                showApp();
            } else {
                loginOverlay.classList.remove('hidden');
                passwordInput.focus();
            }

            // ========== BUILD SIDEBAR ==========
            function buildSidebar() {
                const label = sidebar.querySelector('.sidebar-label');
                sidebar.innerHTML = '';
                sidebar.appendChild(label);

                const allBtn = document.createElement('button');
                allBtn.className = 'sidebar-link active';
                allBtn.setAttribute('data-category', 'all');
                allBtn.innerHTML = `<span>📋</span> All Notes <span class="badge">${notesData.length}</span>`;
                sidebar.appendChild(allBtn);

                const catMap = new Map();
                notesData.forEach(note => {
                    if (!catMap.has(note.category)) catMap.set(note.category, 0);
                    catMap.set(note.category, catMap.get(note.category) + 1);
                });

                catMap.forEach((count, cat) => {
                    const colors = categoryColors[cat] || { dot:'#94a3b8' };
                    const btn = document.createElement('button');
                    btn.className = 'sidebar-link';
                    btn.setAttribute('data-category', cat);
                    btn.innerHTML = `
                        <span class="cat-dot" style="background:${colors.dot};"></span>
                        ${cat.charAt(0).toUpperCase() + cat.slice(1).replace('-',' ')}
                        <span class="badge">${count}</span>
                    `;
                    sidebar.appendChild(btn);
                });

                const quickLabel = document.createElement('span');
                quickLabel.className = 'sidebar-label';
                quickLabel.style.marginTop = '14px';
                quickLabel.textContent = '🔗 Quick Links';
                sidebar.appendChild(quickLabel);
                ['⭐ Starred Notes', '🕐 Recently Viewed', '📝 Add New Note'].forEach(text => {
                    const link = document.createElement('a');
                    link.href = '#';
                    link.className = 'sidebar-link';
                    link.style.fontSize = '0.84rem';
                    link.textContent = text;
                    sidebar.appendChild(link);
                });

                document.querySelectorAll('.sidebar-link[data-category]').forEach(btn => {
                    btn.addEventListener('click', function() {
                        document.querySelectorAll('.sidebar-link[data-category]').forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        activeCategory = this.getAttribute('data-category');
                        renderNotes();
                        if (window.innerWidth <= 900) closeSidebar();
                        document.getElementById('mainContent').scrollTop = 0;
                    });
                });
            }

            // ========== RENDER NOTES ==========
            function renderNotes() {
                let filtered = notesData;
                if (activeCategory !== 'all') filtered = filtered.filter(n => n.category === activeCategory);
                if (searchQuery.trim()) {
                    const q = searchQuery.trim().toLowerCase();
                    filtered = filtered.filter(n =>
                        n.title.toLowerCase().includes(q) ||
                        n.desc.toLowerCase().includes(q) ||
                        n.tags.some(t => t.toLowerCase().includes(q)) ||
                        n.category.toLowerCase().includes(q)
                    );
                }

                notesGrid.innerHTML = '';
                if (filtered.length === 0) {
                    noResults.classList.add('visible');
                    sectionCount.textContent = '0 notes';
                } else {
                    noResults.classList.remove('visible');
                    sectionCount.textContent = `${filtered.length} note${filtered.length>1?'s':''}`;
                    filtered.forEach((note, index) => {
                        const colors = categoryColors[note.category] || { cardAccent:'accent-indigo', iconBg:'indigo' };
                        const card = document.createElement('a');
                        card.className = `note-card ${colors.cardAccent}`;
                        card.href = note.link;
                        card.target = '_blank';
                        card.rel = 'noopener';
                        card.style.animationDelay = `${index * 0.04}s`;
                        card.innerHTML = `
                            <span class="card-arrow">↗</span>
                            <div class="card-icon-row">
                                <span class="card-icon ${colors.iconBg}" style="background: var(--${colors.iconBg}-bg); color: var(--${colors.iconBg});">${note.icon}</span>
                                <span class="card-title">${escapeHTML(note.title)}</span>
                            </div>
                            <p class="card-desc">${escapeHTML(note.desc)}</p>
                            <div class="card-tags">
                                ${note.tags.map(tag => `<span class="tag">#${escapeHTML(tag)}</span>`).join('')}
                            </div>
                            <span class="card-meta">📅 ${note.date}</span>
                        `;
                        notesGrid.appendChild(card);
                    });
                }

                const emojiMap = {
                    selenium: '🌐',
                    java: '☕',
                    unix: '🐧',
                    devops: '🔄',
                    'api-testing': '🔗',
                    'testing-basics': '📋'
                };
                sectionTitle.textContent = activeCategory === 'all' ? '📋 All Notes' : `${emojiMap[activeCategory] || '📌'} ${activeCategory.charAt(0).toUpperCase() + activeCategory.slice(1).replace('-',' ')} Notes`;
                updateBadgeCounts();
            }

            function updateBadgeCounts() {
                const allBadge = document.querySelector('.sidebar-link[data-category="all"] .badge');
                if (allBadge) allBadge.textContent = notesData.length;
                const catCounts = new Map();
                notesData.forEach(n => catCounts.set(n.category, (catCounts.get(n.category)||0)+1));
                document.querySelectorAll('.sidebar-link[data-category]').forEach(btn => {
                    const cat = btn.getAttribute('data-category');
                    if (cat === 'all') return;
                    const badge = btn.querySelector('.badge');
                    if (badge) badge.textContent = catCounts.get(cat) || 0;
                });
            }

            function escapeHTML(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

            searchInput.addEventListener('input', function() {
                searchQuery = this.value;
                searchClear.classList.toggle('visible', !!searchQuery.trim());
                renderNotes();
            });
            searchClear.addEventListener('click', ()=>{
                searchInput.value=''; searchQuery=''; searchClear.classList.remove('visible'); renderNotes(); searchInput.focus();
            });

            const setTheme = (theme) => {
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem('notesHubTheme', theme);
            };
            setTheme(localStorage.getItem('notesHubTheme') || 'light');
            themeToggle.addEventListener('click', ()=>{
                const current = document.documentElement.getAttribute('data-theme');
                setTheme(current === 'dark' ? 'light' : 'dark');
            });

            function openSidebar() { sidebar.classList.add('open'); sidebarOverlay.classList.add('active'); document.body.style.overflow='hidden'; }
            function closeSidebar() { sidebar.classList.remove('open'); sidebarOverlay.classList.remove('active'); document.body.style.overflow=''; }
            menuBtn.addEventListener('click', ()=> sidebar.classList.contains('open') ? closeSidebar() : openSidebar());
            sidebarOverlay.addEventListener('click', closeSidebar);
            document.addEventListener('keydown', (e)=>{
                if (e.key === 'Escape' && sidebar.classList.contains('open')) closeSidebar();
                if ((e.ctrlKey && e.key === 'k') || (e.key === '/' && document.activeElement !== searchInput)) {
                    e.preventDefault(); searchInput.focus();
                }
            });
            window.addEventListener('resize', ()=>{ if (window.innerWidth > 900) closeSidebar(); });

            buildSidebar();
            renderNotes();
            document.querySelector(`.sidebar-link[data-category="${activeCategory}"]`)?.classList.add('active');
        })();
    </script>
</body>
</html>
